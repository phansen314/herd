name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Explicit combinations, not a cross product. 3.9 is the floor pyproject
        # DECLARES (requires-python = ">=3.9") and testing only a modern interpreter
        # lets that claim rot. macOS is here because herd now ships a launchd
        # service, BSD `date` fallbacks and sun_path-length workarounds — all of
        # which are asserted by stubs on Linux and were, until this ran, verified on
        # the platform they exist for exactly never.
        #
        # 3.9 is not paired with macos-latest on purpose: the arm64 runners have no
        # 3.9 build, and pinning macos-13 to get one would test an x86 image nobody
        # uses. The floor is a Python claim, not a platform one, so Linux carries it.
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # The hooks shell out to these, and most of the suite execs the REAL hooks.
      # Verified present rather than assumed: if a runner image drops one, the suite
      # would still "pass" by SKIPPING the tests that matter.
      - name: install the hook toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq sqlite3

      - name: install the hook toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          # jq and sqlite3 ship with the image; install only what is missing so a
          # green run never depends on brew being reachable.
          command -v jq >/dev/null || brew install jq
          command -v sqlite3 >/dev/null || brew install sqlite

      - name: show the toolchain
        run: |
          for t in bash jq sqlite3; do
            printf '%-9s %s\n' "$t" "$(command -v "$t" || echo MISSING)"
          done
          bash --version | head -1     # macOS ships bash 3.2 — herd's stated target
          jq --version
          sqlite3 --version

      - name: install pytest
        run: python -m pip install --quiet --upgrade pip pytest

      - name: run the suite
        run: python -m pytest -q --junitxml=results.xml

      # A GREEN RUN MUST MEAN THE HOOK TESTS RAN. conftest skips them when bash/jq/
      # sqlite3 are missing — right on a contributor's machine, dangerous here, where
      # "0 failures" looks identical to a run that skipped them. Dropping jq alone
      # skips 159 of 665, and nothing in a green summary would say so.
      - name: a green run must not be a skipped run
        run: |
          for t in bash jq sqlite3; do
            command -v "$t" >/dev/null || { echo "::error::$t missing at test time"; exit 1; }
          done
          python .github/check-skips.py results.xml

      # Advisory only: the hooks target bash 3.2 and shellcheck has opinions herd
      # has deliberately overruled. Linux-only — one report is enough.
      - name: shellcheck the hooks (advisory)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          sudo apt-get install -y -qq shellcheck
          shellcheck -S warning src/herd/hooks/*.sh scripts/*.sh || true
