name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the floor pyproject DECLARES (requires-python = ">=3.9"). Testing
        # only a modern interpreter would let that claim rot silently — the floor is
        # a promise to anyone installing on an older distro.
        python: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # The hooks shell out to these, and most of the suite execs the REAL hooks.
      # Installed explicitly rather than trusted to the runner image: if a future
      # image drops one, the suite would still "pass" by SKIPPING the tests that
      # matter, which is the failure this job exists to prevent.
      - name: install the hook toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq sqlite3
          for t in bash jq sqlite3; do
            printf '%-9s %s\n' "$t" "$(command -v "$t" || echo MISSING)"
          done
          jq --version
          sqlite3 --version

      - name: install pytest
        run: python -m pip install --quiet --upgrade pip pytest

      - name: run the suite
        run: python -m pytest -q --junitxml=results.xml

      # A GREEN RUN MUST MEAN THE HOOK TESTS RAN. conftest skips them when bash/jq/
      # sqlite3 are absent — right on a contributor's machine, dangerous here, where
      # "0 failures" looks identical to a run that skipped them. Dropping jq alone
      # skips 159 of 648, and nothing in a green summary would say so.
      #
      # The JUnit skipped count is the signal, NOT a grep of pytest's output: the
      # skip banner is suppressed by -q, so the obvious `pytest -q | grep MISSING`
      # check can never match and is pure decoration. Measured, after writing it.
      - name: a green run must not be a skipped run
        run: |
          for t in bash jq sqlite3; do
            command -v "$t" >/dev/null || { echo "::error::$t missing at test time"; exit 1; }
          done
          python .github/check-skips.py results.xml

      # Advisory only: the hooks target bash 3.2 and shellcheck has opinions herd
      # has deliberately overruled, so this reports without gating the build.
      - name: shellcheck the hooks (advisory)
        continue-on-error: true
        run: |
          sudo apt-get install -y -qq shellcheck
          shellcheck -S warning src/herd/hooks/*.sh scripts/*.sh || true
